site_name: 'ESIIL Community Care'
site_description: 'Central resource for ESIIL Community Care Guidelines and Resources'
site_author: Ty Tuff and Kayleigh Ward
site_url: https://cu-esiil.github.io/ESIIL_community_care

# Repository
repo_name: ESIIL_community_care
repo_url: https://github.com/CU-ESIIL/ESIIL_community_care
edit_uri: edit/main/docs/
# Copyright
copyright: 'Copyright &copy; 2023 University of Colorado Boulder'

# Page tree
nav:
  - Home: index.md
  - Working Group Collaboration Resources:
        - ESIIL Code of Conduct: resources/ESIIL_Code_of_Conduct.md 
        - ESIIL Guidelines for Intellectual Contributions and Credit: resources/ESIIL_Contributions_and_Credit.md
        - Collaboration Leads: resources/masterlist.md 
        - Norming & Teaming: resources/templates.md
        - CRediT Tracker: resources/c_tracker.md
        - AI Scoreboard: resources/AI_tracker.md
 

# Configuration
theme:
  highlightjs: true
  name: material
  font:
    text: 'Open Sans'
    code: 'Roboto Mono'
  logo: 'ESIIL_logo.png'
  favicon: 'assets/favicon.ico'
  # setting features for the navigation tab
  features:
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - toc.follow
    - content.code.copy
  # Default values, taken from mkdocs_theme.yml
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: white)"
      primary: 'white'
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference

# Options
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cu-esiil/

extra_css:
  - stylesheets/extra.css

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
